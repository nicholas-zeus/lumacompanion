<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Escalation — Case</title>

  <link rel="stylesheet" href="/css/app.css" />
  <link rel="stylesheet" href="/css/case.css" />

  <!-- Page-level wrapper for consistent max width across all tabs -->
  <style>
    .page-wrap { max-width: 1100px; margin: 0 auto; padding: 0 16px; }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="app-header">
    <div class="page-wrap" style="display:flex;align-items:center;justify-content:space-between;gap:12px;">
      <div class="brand">
        <a href="/index.html" class="brand-mark" aria-label="Back to Dashboard">E</a>
        <div class="brand-text">
          <strong>Escalation</strong>
          <span class="brand-sub" id="caseTitle">Case</span>
        </div>
      </div>

      <div class="header-actions">
        <a id="backBtn" href="/index.html" class="btn">← Back</a>
        <div id="roleBadge" class="role-badge" hidden></div>
        <button id="finishBtn"   class="btn btn-primary" hidden>Mark Finished</button>
        <button id="undoBtn"     class="btn" hidden>Undo Finish</button>
        <button id="exportBtn"   class="btn" hidden>Export PDF</button>
      </div>
    </div>
  </header>

  <!-- Tabs -->
  <nav class="tabs">
    <div class="page-wrap tabs-list">
      <button id="tab-overview"  class="tab is-active" data-tab="details">Overview</button>
      <button id="tab-manage"    class="tab"          data-tab="manage">Manage Documents</button>
      <button id="tab-documents" class="tab"          data-tab="documents">View Documents</button>
      <button id="tab-comments"  class="tab"          data-tab="comments">Comments</button>
    </div>
  </nav>

  <!-- OVERVIEW TAB -->
  <section id="tab-details" class="tabpanel is-active" aria-labelledby="details">
    <div class="page-wrap">
      <div id="finishedLock" class="banner hidden">This case is <strong>Finished</strong>. Undo to make changes.</div>

      <div class="grid-2">
        <!-- Left column: case details -->
        <div class="card">
          <div class="card-header">
            <h2>Case Details</h2>
          </div>
          <div class="card-body">
            <div class="grid-2">
              <div>
                <label>Case ID</label>
                <div id="details-caseId" class="value">—</div>
              </div>
              <div>
                <label>Status</label>
                <div id="details-status" class="value">—</div>
              </div>
              <div>
                <label>Created At</label>
                <div id="details-createdAt" class="value">—</div>
              </div>
              <div>
                <label>Updated At</label>
                <div id="details-updatedAt" class="value">—</div>
              </div>
              <div>
                <label>Owner</label>
                <div id="details-owner" class="value">—</div>
              </div>
              <div>
                <label>Assignee</label>
                <div id="details-assignee" class="value">—</div>
              </div>
              <div>
                <label>Patient Name</label>
                <div id="details-patientName" class="value">—</div>
              </div>
              <div>
                <label>Patient Age</label>
                <div id="details-patientAge" class="value">—</div>
              </div>
              <div>
                <label>Hospital</label>
                <div id="details-hospital" class="value">—</div>
              </div>
              <div>
                <label>Admission Date</label>
                <div id="details-admitDate" class="value">—</div>
              </div>
              <div>
                <label>Discharge Date</label>
                <div id="details-dischargeDate" class="value">—</div>
              </div>
              <div>
                <label>Case Tags</label>
                <div id="details-tags" class="value">—</div>
              </div>
            </div>
          </div>
        </div>

        <!-- Right column: quick actions -->
        <div class="card">
          <div class="card-header">
            <h2>Quick Actions</h2>
          </div>
          <div class="card-body">
            <div class="button-row">
              <button id="refreshOverview" class="btn">Refresh</button>
              <button id="openDrive" class="btn">Open Drive Folder</button>
              <button id="openFirestore" class="btn">Open in Firestore</button>
            </div>

            <div class="divider"></div>

            <form id="editCaseForm" class="form-grid">
              <div class="field">
                <label for="patientName">Patient Name</label>
                <input id="patientName" type="text" placeholder="—" />
              </div>
              <div class="field">
                <label for="hospitalName">Hospital</label>
                <input id="hospitalName" type="text" placeholder="—" />
              </div>
              <div class="field">
                <label for="admitDate">Admission Date</label>
                <input id="admitDate" type="date" />
              </div>
              <div class="field">
                <label for="dischargeDate">Discharge Date</label>
                <input id="dischargeDate" type="date" />
              </div>
              <div class="field">
                <label for="assignee">Assignee</label>
                <input id="assignee" type="text" placeholder="—" />
              </div>
              <div class="field">
                <label for="caseTags">Tags</label>
                <input id="caseTags" type="text" placeholder="comma,separated" />
              </div>
              <div class="field span-2">
                <button id="saveCaseMeta" type="button" class="btn btn-primary">Save Details</button>
              </div>
            </form>
          </div>
        </div>
      </div> <!-- /grid-2 -->

      <div class="card">
        <div class="card-header">
          <h2>Audit Trail</h2>
        </div>
        <div class="card-body">
          <div id="auditTimeline" class="timeline"></div>
        </div>
      </div>
    </div>
  </section>

  <!-- MANAGE DOCUMENTS TAB -->
  <section id="panel-manage" class="tabpanel" aria-labelledby="manage">
    <div class="page-wrap">
      <div id="savingOverlay" class="overlay" hidden>
        <div class="overlay-content">Saving changes…</div>
      </div>

      <div class="grid-2">
        <!-- Left: Upload / batches -->
        <div class="card">
          <div class="card-header">
            <h2>Upload</h2>
          </div>
          <div class="card-body">
            <form id="uploadForm">
              <div class="field">
                <label for="batchNo">Batch No <span class="req">*</span></label>
                <input id="batchNo" type="text" placeholder="e.g., 2025-09-24-A" required />
              </div>
              <div class="field">
                <label for="docType">Document Type</label>
                <input id="docType" type="text" placeholder="e.g., Invoice, LAB, LOG" />
              </div>
              <div class="field">
                <label for="tags">Tags</label>
                <input id="tags" type="text" placeholder="comma,separated" />
              </div>
              <div class="field">
                <label for="fileInput">Files</label>
                <input id="fileInput" type="file" multiple />
              </div>
              <div class="button-row">
                <button id="uploadBtn" class="btn btn-primary" type="submit">Upload</button>
                <button id="clearUpload" class="btn" type="button">Clear</button>
              </div>
            </form>
          </div>
        </div>

        <!-- Right: Batch list -->
        <div class="card">
          <div class="card-header">
            <h2>Batches</h2>
          </div>
          <div class="card-body">
            <div class="toolbar">
              <input id="batchSearch" type="text" placeholder="Search batches…" />
              <button id="refreshBatches" class="btn" type="button">Refresh</button>
            </div>
            <div id="batchList" class="list"></div>
          </div>
        </div>
      </div>

      <!-- Documents in selected batch -->
      <div class="card">
        <div class="card-header">
          <h2>Documents</h2>
          <div class="button-row">
            <button id="saveDocChanges" class="btn btn-primary" type="button">Save Changes</button>
            <button id="revertDocChanges" class="btn" type="button">Revert</button>
            <button id="deleteSelectedDocs" class="btn btn-danger" type="button">Delete Selected</button>
          </div>
        </div>
        <div class="card-body">
          <div class="toolbar">
            <input id="docSearch" type="text" placeholder="Search documents…" />
            <button id="refreshDocs" class="btn" type="button">Refresh</button>
          </div>
          <div id="docTableWrap" class="table-wrap">
            <table id="docTable" class="table">
              <thead>
                <tr>
                  <th><input id="selectAllDocs" type="checkbox" /></th>
                  <th>File Name</th>
                  <th>Type</th>
                  <th>Size</th>
                  <th>Pages</th>
                  <th>Tags</th>
                  <th>Uploaded</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="docTableBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- VIEW DOCUMENTS TAB -->
  <section id="panel-documents" class="tabpanel" aria-labelledby="documents">
    <div class="page-wrap">
      <div class="grid-docviewer">
        <aside class="viewer-list">
          <div class="toolbar">
            <select id="tagFilter"></select>
            <input id="fileFilter" type="text" placeholder="Filter…" />
            <button id="tagFilterClear" type="button" class="btn">Clear</button>
            <div>Files: <span id="docCount">0</span></div>
          </div>
          <div id="docs-list"></div>
        </aside>
        <div class="viewer-card">
          <div class="viewer-actions">
            <a id="doc-open" class="btn" target="_blank">Open</a>
            <a id="doc-download" class="btn" target="_blank">Download</a>
          </div>
          <div id="doc-viewer"></div>
        </div>
      </div>
    </div>
  </section>

  <!-- COMMENTS TAB -->
  <section id="panel-comments" class="tabpanel" aria-labelledby="comments">
    <div class="page-wrap">
      <div class="card">
        <div class="card-header">
          <h2>Comments</h2>
        </div>
        <div class="card-body">
          <div id="commentsList" class="comments"></div>
        </div>
      </div>

      <form id="comment-form">
        <textarea id="comment-input" placeholder="Write a comment…"></textarea>
        <button class="btn" type="submit">Post</button>
      </form>
    </div>
  </section>

  <!-- Bootstraps & tab router (adds window.caseId/currentUser and fixes active vs is-active) -->
  <script>
    (function(){
      const params = new URLSearchParams(location.search);
      const fromHash = (location.hash || '').replace(/^#/, '');
      window.caseId = window.caseId || params.get('caseId') || fromHash || null;
      window.currentUser = window.currentUser || null;
      if (window.caseId) {
        const titleEl = document.getElementById('caseTitle');
        if (titleEl) titleEl.textContent = 'Case: ' + window.caseId;
      }
    })();
  </script>

  <script>
    (function(){
      const addCompat = (el) => {
        if (!el) return;
        if (el.classList.contains('is-active') && !el.classList.contains('active')) {
          el.classList.add('active');
        }
      };
      document.addEventListener('DOMContentLoaded', () => {
        // Mirror classes so existing JS that checks 'active' still works
        document.querySelectorAll('.tab, .tabpanel').forEach(addCompat);

        const mapPanelId = (tabEl) => {
          const key = tabEl?.dataset?.tab;
          if (!key) return null;
          if (key === 'details') return 'tab-details'; // Overview panel id
          return 'panel-' + key; // manage, documents, comments
        };

        const activate = (tabEl) => {
          const targetId = mapPanelId(tabEl);
          if (!targetId) return;

          // Toggle tab buttons
          document.querySelectorAll('.tab').forEach(btn => {
            const on = btn === tabEl;
            btn.classList.toggle('is-active', on);
            btn.classList.toggle('active', on);
          });

          // Toggle panels
          document.querySelectorAll('.tabpanel').forEach(p => {
            const on = p.id === targetId;
            p.classList.toggle('is-active', on);
            p.classList.toggle('active', on);
          });

          // Notify modules (optional)
          document.dispatchEvent(new CustomEvent('case:tabchange', { detail: { id: targetId } }));
        };

        // Click to switch tabs
        document.addEventListener('click', (e) => {
          const btn = e.target.closest('.tab');
          if (!btn) return;
          e.preventDefault();
          activate(btn);
        });

        // Normalize initial state
        const initial = document.querySelector('.tab.is-active') ||
                        document.querySelector('.tab.active') ||
                        document.getElementById('tab-overview');
        if (initial) activate(initial);
      });
    })();
  </script>

  <!-- Scripts -->
  <script type="module" src="/js/case-overview.js"></script>
  <script type="module" src="/js/case-comments.js"></script>
  <script type="module" src="/js/case-documents.js"></script>
  <script type="module" src="/js/case-manage.js"></script>
</body>
</html>
