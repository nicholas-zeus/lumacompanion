<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Escalation — Case</title>

  <link rel="stylesheet" href="/css/app.css" />
  <link rel="stylesheet" href="/css/case.css" />

  <!-- Page-level wrapper for consistent max width across all tabs -->
  <style>
    .page-wrap { max-width: 1100px; margin: 0 auto; padding: 0 16px; }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="app-header">
    <div class="page-wrap" style="display:flex;align-items:center;justify-content:space-between;gap:12px;">
      <div class="brand">
        <a href="/index.html" class="brand-mark" aria-label="Back to Dashboard">E</a>
        <div class="brand-text">
          <strong>Escalation</strong>
          <span class="brand-sub" id="caseTitle">Case</span>
        </div>
      </div>

      <div class="header-actions">
        <a id="backBtn" href="/index.html" class="btn">← Back</a>
        <div id="roleBadge" class="role-badge" hidden></div>
        <button id="finishBtn"   class="btn btn-primary" hidden>Mark Finished</button>
        <button id="undoBtn"     class="btn" hidden>Undo Finished</button>
        <button id="downloadPdf" class="btn" hidden>Download Transcript</button>
        <button id="signOutBtn"  class="btn btn-ghost" hidden>Sign out</button>
        <img id="avatar" class="avatar" alt="" hidden />
      </div>
    </div>
  </header>

  <!-- Banners -->
  <div class="banner-area">
    <div class="page-wrap">
      <div id="bannerArea" aria-live="polite"></div>
    </div>
  </div>

  <!-- Tabs -->
  <nav class="tabs">
    <div class="page-wrap" style="display:flex;gap:8px;">
      <button id="tab-overview" class="tab is-active" data-tab="details">Overview</button>
      <button id="tab-manage" class="tab" data-tab="documents">Manage Documents</button>
      <button id="tab-documents" class="tab" data-tab="docview">View Documents</button>
      <button id="tab-comments" class="tab" data-tab="comments">Comments</button>
    </div>
  </nav>

  <!-- OVERVIEW TAB -->
  <section id="tab-details" class="tabpanel is-active" aria-labelledby="details">
    <div class="page-wrap">
      <div id="finishedLock" class="banner hidden">This case is <strong>Finished</strong>. Undo to make changes.</div>

      <form id="detailsForm" class="form-grid">
        <!-- Row 1 -->
        <div class="field">
          <label>Name <span class="req">*</span></label>
          <input id="fName" class="input" required />
          <div id="ovr-patientName"></div>
        </div>
        <div class="field">
          <label>Member ID <span class="req">*</span></label>
          <input id="fMemberID" class="input" required />
          <div id="ovr-patientId"></div>
        </div>
        <div class="field">
          <label>Nationality <span class="req">*</span></label>
          <input id="fNationality" class="input" required />
        </div>

        <!-- Row 2 -->
        <div class="field">
          <label>DOB <span class="req">*</span></label>
          <input id="fDOB" type="date" class="input" required />
          <div id="ovr-dob"></div>
        </div>
        <div class="field">
          <label>Age (years)</label>
          <input id="fAgeYears" class="input" readonly />
          <div id="ovr-age"></div>
        </div>
        <div class="field">
          <label>Age (months)</label>
          <input id="fAgeMonths" class="input" readonly />
        </div>

        <!-- Row 3 -->
        <div class="field">
          <label>Policy Effective Date <span class="req">*</span></label>
          <input id="fPolicyEff" type="date" class="input" required />
        </div>
        <div class="field">
          <label>Underwriting Type <span class="req">*</span></label>
          <select id="fUWType" class="input" required>
            <option value="">— select —</option>
            <option value="MHD">MHD</option>
            <option value="FMU">FMU</option>
          </select>
        </div>
        <div class="field">
          <label>Type of Admission <span class="req">*</span></label>
          <select id="fAdmissionType" class="input" required>
            <option value="">— select —</option>
            <option>Scheduled</option>
            <option>Admit</option>
            <option>Discharge</option>
          </select>
        </div>

        <!-- Row 4 -->
        <div class="field">
          <label>Type of Consultation <span class="req">*</span></label>
          <input id="fConsultType" class="input" placeholder="e.g., simple disease, high cost, ex-gratia" required />
        </div>
        <div class="field">
          <label>Visit Date <span class="req">*</span></label>
          <input id="fVisitDate" type="date" class="input" required />
          <div id="ovr-visitDate"></div>
        </div>
        <div class="field">
          <label>Hospital <span class="req">*</span></label>
          <input id="fHospital" class="input" required />
          <div id="ovr-hospital"></div>
        </div>

        <!-- Row 5 -->
        <div class="field">
          <label>Diagnosis <span class="req">*</span></label>
          <input id="fDiagnosis" class="input" required />
          <div id="ovr-diagnosis"></div>
        </div>
        <div class="field">
          <label>Discharge Date</label>
          <input id="fDischargeDate" type="date" class="input" />
        </div>
        <div class="field">
          <label>Chief Complaint <span class="req">*</span></label>
          <input id="fChiefComplaint" class="input" required />
        </div>

        <!-- Row 6 -->
        <div class="field span-2">
          <label>Present Illness <span class="req">*</span></label>
          <textarea id="fPresentIllness" class="input" rows="2" required></textarea>
        </div>
        <div class="field span-2">
          <label>Exclusion <span class="req">*</span></label>
          <textarea id="fExclusion" class="input" rows="2" required></textarea>
        </div>

        <!-- Row 7 -->
        <div class="field">
          <label class="checkbox">
            <input id="fUrgent" type="checkbox" /> Urgent
          </label>
          <small class="hint">If checked, a Deadline is required. Note: items beyond 24h are not considered urgent.</small>
        </div>
        <div class="field">
          <label>Deadline (local)</label>
          <input id="fDeadline" type="datetime-local" class="input" />
        </div>
        <div class="field"></div>

        <!-- Row 8 (optionals) -->
        <div class="field span-2">
          <label>Vital Signs</label>
          <textarea id="fVitalSigns" class="input" rows="2"></textarea>
        </div>
        <div class="field span-2">
          <label>Physical Findings</label>
          <textarea id="fPhysicalFindings" class="input" rows="2"></textarea>
        </div>

        <!-- Row 9 -->
        <div class="field span-2">
          <label>Summary</label>
          <textarea id="fSummary" class="input" rows="3"></textarea>
          <div id="ovr-summary"></div>
        </div>
        <div class="field span-2">
          <label>Treatment</label>
          <textarea id="fTreatment" class="input" rows="2"></textarea>
        </div>

        <!-- Row 10 -->
        <div class="field span-2">
          <label>Reason for Admission <span class="req">*</span></label>
          <textarea id="fReasonAdm" class="input" rows="2" required></textarea>
        </div>
        <div class="field span-2">
          <label>Reason for Consultation <span class="req">*</span></label>
          <textarea id="fReasonConsult" class="input" rows="2" required></textarea>
        </div>

        <!-- Row 11 -->
        <div class="field span-2">
          <label>Other Remark</label>
          <textarea id="fOtherRemark" class="input" rows="2"></textarea>
        </div>

        <div class="split">
          <div>
            <div class="muted">Status</div>
            <div id="statusText" class="status-readout">—</div>
          </div>
          <div class="right-actions">
            <button id="editDetailsBtn" class="btn">Edit</button>
            <button id="saveDetailsBtn" class="btn btn-primary" hidden>Save</button>
            <button id="assignNurseBtn" class="btn" hidden>Assign me (Nurse)</button>
            <button id="assignDoctorBtn" class="btn" hidden>Assign me (Doctor)</button>
          </div>
        </div>
      </form>

      <!-- New case only -->
      <div id="newCaseActions" class="split hidden">
        <div></div>
        <button id="createCaseBtn" class="btn btn-primary">Create Case</button>
      </div>
    </div>
  </section>

  <!-- MANAGE DOCUMENTS TAB -->
  <section id="panel-manage" class="tabpanel" aria-labelledby="tab-manage">
    <div class="page-wrap">
      <div class="uploader">
        <input id="fileInput" type="file" multiple />
        <input id="uploadTags" type="text" placeholder="Tags (comma separated)" />
        <input id="batchNo" type="text" placeholder="Batch No." />
        <button id="uploadBtn" class="btn" type="button">Upload</button>
      </div>
      <div id="manage-list" class="manage-list"></div>
    </div>
  </section>

  <!-- VIEW DOCUMENTS TAB -->
  <section id="panel-documents" class="tabpanel" aria-labelledby="tab-documents">
    <div class="page-wrap">
      <div class="docview-shell">
        <aside class="doc-list">
          <input id="tagFilter" type="text" placeholder="Filter…" />
          <button id="tagFilterClear" type="button" class="btn">Clear</button>
          <div>Files: <span id="docCount">0</span></div>
          <div id="docs-list"></div>
        </aside>
        <div class="viewer-card">
          <div class="viewer-actions">
            <a id="doc-open" class="btn" target="_blank">Open</a>
            <a id="doc-download" class="btn" target="_blank">Download</a>
          </div>
          <div id="doc-viewer"></div>
        </div>
      </div>
    </div>
  </section>

  <!-- COMMENTS TAB -->
  <section id="panel-comments" class="tabpanel" aria-labelledby="tab-comments">
    <div class="page-wrap">
      <div id="comments-list"></div>
      <form id="comment-form">
        <textarea id="comment-input" placeholder="Write a comment…"></textarea>
        <button class="btn" type="submit">Post</button>
      </form>
    </div>
  </section>

  <!-- Scripts -->
  <script type="module" src="/js/case-overview.js"></script>
  <script type="module" src="/js/case-comments.js"></script>
  <script type="module" src="/js/case-documents.js"></script>
  <script type="module" src="/js/case-manage.js"></script>
</body>
</html>
