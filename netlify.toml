# Netlify config for static pages + Functions

[build]
  # Your HTML files (index.html, poctest.html) live at the project root
  publish = "."
  command = ""

[build.environment]
  # Ensure Node 18 at build/runtime (your package.json targets >=18) 
  NODE_VERSION = "18"

[functions]
  # Where your functions live (env-check.js, drive-check.js)
  directory = "netlify/functions"
  node_bundler = "esbuild"
  # googleapis is used by drive-check; leaving it external avoids heavy bundling
  external_node_modules = ["googleapis"]

[dev]
  # Makes `netlify dev` pick up your functions and static root
  functions = "netlify/functions"
  publish = "."
  framework = "#static"

# Optional: pretty URL for the POC page
[[redirects]]
  from = "/poctest"
  to = "/poctest.html"
  status = 200
